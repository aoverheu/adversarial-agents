<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpBot - TechNova Support</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header .subtitle {
            font-size: 12px;
            color: #94a3b8;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #4ade80;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
        }

        /* Chat area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 720px;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.bot .avatar {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        .message.user .avatar {
            background: #334155;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.bot .bubble {
            background: #1e293b;
            border: 1px solid #334155;
            border-bottom-left-radius: 4px;
        }

        .message.user .bubble {
            background: #4f46e5;
            border-bottom-right-radius: 4px;
        }

        /* Typing indicator */
        .typing {
            display: none;
            align-self: flex-start;
            gap: 12px;
            align-items: center;
        }

        .typing.visible { display: flex; }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: #64748b;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input area */
        .input-area {
            background: #1e293b;
            border-top: 1px solid #334155;
            padding: 16px 24px;
        }

        .input-row {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }

        .input-row input {
            flex: 1;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-row input:focus {
            border-color: #6366f1;
        }

        .input-row input::placeholder {
            color: #475569;
        }

        .send-btn {
            padding: 12px 20px;
            background: #4f46e5;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:hover { background: #4338ca; }
        .send-btn:disabled { background: #334155; cursor: not-allowed; }

        .reset-btn {
            padding: 12px 16px;
            background: transparent;
            border: 1px solid #334155;
            border-radius: 12px;
            color: #94a3b8;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        /* Welcome message */
        .welcome {
            text-align: center;
            padding: 48px 24px;
            color: #64748b;
        }

        .welcome h2 {
            color: #e2e8f0;
            margin-bottom: 8px;
            font-size: 20px;
        }

        .welcome p { font-size: 14px; margin-bottom: 16px; }

        .suggestions {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .suggestion {
            padding: 8px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            font-size: 13px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion:hover {
            border-color: #6366f1;
            color: #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">T</div>
            <div>
                <h1>TechNova Support</h1>
                <div class="subtitle">Powered by HelpBot AI</div>
            </div>
        </div>
        <div class="status">
            <span class="status-dot"></span>
            Online
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <h2>Welcome to TechNova Support</h2>
            <p>Ask me anything about our products: NovaCMS, NovaDB, or NovaAuth</p>
            <div class="suggestions">
                <span class="suggestion" onclick="sendSuggestion(this)">What plans does NovaCMS offer?</span>
                <span class="suggestion" onclick="sendSuggestion(this)">How much does NovaDB cost?</span>
                <span class="suggestion" onclick="sendSuggestion(this)">Tell me about NovaAuth</span>
            </div>
        </div>

        <div class="typing" id="typing">
            <div class="avatar">T</div>
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" id="messageInput" placeholder="Type your message..."
                   onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
            <button class="reset-btn" onclick="resetChat()">Reset</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typing = document.getElementById('typing');
        const welcome = document.getElementById('welcome');
        const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);

        function addMessage(text, role) {
            welcome.style.display = 'none';
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="avatar">${role === 'bot' ? 'T' : 'U'}</div>
                <div class="bubble">${escapeHtml(text)}</div>
            `;
            chatContainer.insertBefore(div, typing);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            messageInput.value = '';
            sendBtn.disabled = true;
            addMessage(text, 'user');

            typing.classList.add('visible');
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: sessionId })
                });
                const data = await res.json();
                typing.classList.remove('visible');
                addMessage(data.response, 'bot');
            } catch (err) {
                typing.classList.remove('visible');
                addMessage('Sorry, something went wrong. Please try again.', 'bot');
            }

            sendBtn.disabled = false;
            messageInput.focus();
        }

        function sendSuggestion(el) {
            messageInput.value = el.textContent;
            sendMessage();
        }

        async function resetChat() {
            await fetch('/api/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId })
            });
            chatContainer.querySelectorAll('.message').forEach(m => m.remove());
            welcome.style.display = 'block';
        }

        messageInput.focus();
    </script>
</body>
</html>
